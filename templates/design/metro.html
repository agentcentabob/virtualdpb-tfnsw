<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Departure Board</title>
    <link rel="stylesheet" href="/static/css/master/colors.css">
    <link rel="stylesheet" href="/static/css/design/metro.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="back-link">← Back</a>
            <div class="header-time" id="headerTime">time: --:--</div>
            <div class="station-info" id="stationInfo" style="display: none;">
                <span id="stationName"></span>
                <span id="stationId"></span>
            </div>
            <div class="controls">
                <div class="search-container">
                    <input type="text" id="stopInput" placeholder="Search station by name or enter Stop ID" />
                    <div id="suggestions" class="suggestions-dropdown"></div>
                </div>
                <button id="loadBtn">Load Departures</button>
                <button id="refreshBtn">Refresh</button>
            </div>
            <div class="status" id="status"></div>
        </header>

        <div class="board">
            <div class="board-header">
                <div class="col-time">Time</div>
                <div class="col-line">Line</div>
                <div class="col-destination">Destination</div>
                <div class="col-platform">Platform</div>
            </div>
            <div id="departures" class="departures-list">
                <!-- departures will be inserted here -->
            </div>
        </div>

        <div class="empty-state" id="emptyState">
            <p>Enter a stop ID or search for a station and click "Load Departures" to begin</p>
        </div>
    </div>

    <script type="module" src="/static/js/design/metro.js"></script>
</body>
</html>
